<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Movie Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="login-wrap">
    <div class="row g-3 align-items-stretch">

        <!-- Brand panel -->
        <div class="col-12 col-md-6">
            <div class="brand-panel">
                <p class="eyebrow">Create account</p>
                <h1>Start your movie diary.</h1>
                <p class="brand-copy">
                    Create an account to save watched movies, keep a watchlist, and share selected entries on your public profile.
                </p>
                <div class="feature-list">
                    <span>Personal diary</span>
                    <span>Public profile</span>
                    <span>Saved watch history</span>
                </div>
            </div>
        </div>

        <!-- Form panel -->
        <div class="col-12 col-md-6">
            <div class="form-card">
                <p class="back-home"><a href="{{ url_for('home') }}">← Back to Home</a></p>
                <h2>Sign up</h2>
                <p class="form-subtitle">Create your account to continue.</p>

                <form>
                    <div class="mb-2">
                        <label for="username" class="form-label">Username</label>
                        <input id="username" name="username" type="text" class="form-control"
                               placeholder="Choose a username" required>
                    </div>

                    <div class="mb-2">
                        <label for="email" class="form-label">Email</label>
                        <input id="email" name="email" type="email" class="form-control"
                               placeholder="you@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input id="password" name="password" type="password" class="form-control"
                               placeholder="Create password" required>
                    </div>

                    <button type="submit" class="btn-signup">Create Account</button>
                </form>

                <p class="signup-note">
                    Already have an account? <a href="{{ url_for('login') }}">Log in</a>
                </p>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
