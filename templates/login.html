<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Movie Diary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
    <main class="login-shell">
        <section class="brand-panel">
            <p class="eyebrow">Movie Diary</p>
            <h1>Keep your movie journey in one place.</h1>
            <p class="brand-copy">
                Log in to manage your watched movies, watchlist, reviews, and profile.
            </p>
            <div class="feature-list">
                <span>Save watched movies</span>
                <span>Write reviews</span>
                <span>Manage your profile</span>
            </div>
        </section>

        <section class="form-panel" aria-labelledby="login-heading">
            <div class="form-card">
                <p class="back-home"><a href="{{ url_for('home') }}">Back to Home</a></p>
                <h2 id="login-heading">Welcome back</h2>
                <p class="form-subtitle">Sign in to continue your movie diary.</p>

                <form method="POST" action="{{ url_for('login') }}">
                    <label for="email">Email</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >

                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        placeholder="Enter password"
                        autocomplete="current-password"
                        required
                    >

                    <button type="submit">Log In</button>
                </form>

                <p class="signup-note">
                    New here? <a href="{{ url_for('signup') }}">Create an account</a>
                </p>
            </div>
        </section>
    </main>
</body>
</html>
