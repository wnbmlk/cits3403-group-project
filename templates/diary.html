<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary Timeline | Movie Diary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='diary.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="container nav-content">
        <div class="logo">Movie Diary</div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('diary') }}">Diary</a>
            <a href="{{ url_for('profile') }}">Profile</a>
            <a href="{{ url_for('login') }}">Login</a>
        </div>
    </div>
</nav>

<main class="container page-wrap">
    <header class="page-head">
        <h1>Diary Timeline</h1>
        <p>Scroll left to right and click a plus box to add a movie to your timeline.</p>
    </header>

    <section class="timeline-wrap" aria-label="Movie timeline">
        <div class="timeline-line"></div>
        <div id="timelineTrack" class="timeline-track"></div>
    </section>
</main>

<div class="modal-backdrop" id="movieModal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="movieModalTitle">
        <button class="modal-close" id="closeMovieModal" type="button" aria-label="Close search">×</button>
        <h2 id="movieModalTitle">Add a movie</h2>
        <p>Search your timeline library and pick one movie to add.</p>
        <label class="search-label" for="movieSearch">Search title</label>
        <input id="movieSearch" class="search-input" type="search" placeholder="Type a movie name...">
        <div id="searchResults" class="search-results"></div>
    </div>
</div>

<template id="timelineMovieTemplate">
    <article class="timeline-item movie-item">
        <p class="time-stamp"></p>
        <div class="movie-card">
            <button class="remove-card" type="button" aria-label="Remove movie">×</button>
            <img alt="">
            <div class="movie-meta">
                <h3></h3>
                <p></p>
            </div>
        </div>
    </article>
</template>

<template id="timelineAddTemplate">
    <article class="timeline-item add-item">
        <button class="add-card" type="button" aria-label="Add a movie">
            <span class="add-icon">+</span>
            <span class="add-text">Add movie</span>
        </button>
    </article>
</template>

<script src="{{ url_for('static', filename='diary.js') }}"></script>
</body>
</html>
